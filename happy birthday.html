<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      background:#000;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
    }

    .tip{
      position:absolute;
      top:20px;
      left:20px;
      color:white;
      font-size:14px;
      padding:8px 14px;
      border-radius:10px;
      background:rgba(0,0,0,0.5);
      backdrop-filter:blur(5px);
      font-family:Arial;
      z-index:10;
    }
  </style>
</head>

<body>

  <div class="tip">视频加载中...</div>

  <video
    id="video"
    autoplay
    muted
    playsinline
    loop
    controls
  >
    <!-- 把下面链接换成你自己的视频 -->
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>

  <script>
    const video = document.getElementById("video");

    // 自动播放
    video.play().catch(err => {
      console.log("自动播放失败:", err);
    });

    // 播放成功后隐藏提示
    video.addEventListener("playing", () => {
      document.querySelector(".tip").style.display = "none";
    });

    // ===== 自动跳转（可选）=====
    // 想开启就删掉前后的 /* */

    /*
    setTimeout(() => {
      window.location.href = "https://google.com";
    }, 10000);
    */

  </script>

</body>
</html>
